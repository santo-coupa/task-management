<div class="users-header">
  <h2>Users</h2>

  <button
    pButton
    label="New User"
    icon="pi pi-plus"
    class="p-button-sm"
    (click)="openCreate()"
  ></button>
</div>

<p-table
  [value]="(users$ | async) ?? []"
  [paginator]="true"
  [rows]="8"
>

  <ng-template pTemplate="header">
    <tr>
      <th>Username</th>
      <th>Email</th>
      <th>Title</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-user>
    <tr>
      <td>{{ user.username }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.title }}</td>
      <td>{{ user.isActive ? 'Active' : 'Inactive' }}</td>
      <td>
        <button
          pButton
          icon="pi pi-pencil"
          class="p-button-text"
          (click)="openEdit(user)"
        ></button>

        <button
          pButton
          icon="pi pi-trash"
          class="p-button-danger p-button-text"
          (click)="deleteUser(user.id)"
        ></button>
      </td>
    </tr>
  </ng-template>

</p-table>

<p-confirmDialog></p-confirmDialog>
