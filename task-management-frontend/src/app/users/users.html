<p-table
  [value]="(users$ | async) ?? []"
  [paginator]="true"
  [rows]="8"
>

  <ng-template pTemplate="header">
    <tr>
      <th>Username</th>
      <th>Email</th>
      <th>Role</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-user>
    <tr>
      <td>{{ user.username }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.role }}</td>
      <td>{{ user.isActive ? 'Active' : 'Inactive' }}</td>
      <td>
        <button
          pButton
          icon="pi pi-trash"
          class="p-button-danger p-button-sm"
          (click)="deleteUser(user.id)"
        ></button>
      </td>
    </tr>
  </ng-template>

</p-table>

<p-confirmDialog></p-confirmDialog>
