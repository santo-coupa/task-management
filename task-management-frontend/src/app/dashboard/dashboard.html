<h2>Dashboard</h2>

@if (vm$ | async; as vm) {

  <div class="stats">
    <div class="card">
      <h3>Total Tasks</h3>
      <p>{{ vm.totalTasks }}</p>
    </div>

    <div class="card">
      <h3>In Progress</h3>
      <p>{{ vm.inProgressTasks }}</p>
    </div>

    <div class="card">
      <h3>Pending</h3>
      <p>{{ vm.pendingTasks }}</p>
    </div>

    <div class="card">
      <h3>Completed</h3>
      <p>{{ vm.completedTasks }}</p>
    </div>
  </div>

  @if (vm.isAdmin) {
    <div class="admin-note">
      <p>You are viewing the Admin dashboard.</p>
    </div>
  } @else {
    <div class="user-note">
      <p>You are viewing your personal dashboard.</p>
    </div>
  }

}
