<div class="password-wrapper">
  <p-card>
    <h2>Change Password</h2>

    <div class="password-grid">
      <div class="field">
        <label>Current Password</label>
        <p-password [(ngModel)]="currentPassword"></p-password>
      </div>

      <div class="field">
        <label>New Password</label>
        <p-password [(ngModel)]="newPassword"></p-password>
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <p-password [(ngModel)]="confirmPassword"></p-password>
      </div>
    </div>

    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }

    <div class="actions">
      <button
        pButton
        label="Update Password"
        icon="pi pi-check"
        (click)="updatePassword()"
      ></button>

      <button pButton label="Cancel" class="p-button-secondary" (click)="cancel()"></button>
    </div>
  </p-card>
</div>
