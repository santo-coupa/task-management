<div class="tasks-wrapper">
  <div class="tasks-header">
    <h2>Tasks</h2>

    <button
      pButton
      type="button"
      label="New Task"
      icon="pi pi-plus"
      class="p-button-sm"
      (click)="openCreateTask()"
    ></button>
  </div>

  <p-card>
    <p-confirmdialog></p-confirmdialog>
    <p-table
      #dt
      [value]="(tasks$ | async) ?? []"
      [paginator]="true"
      [rows]="8"
      [rowsPerPageOptions]="[5, 8, 15]"
      [globalFilterFields]="['title', 'status', 'assignedToUserId']"
      responsiveLayout="scroll"
    >
      <ng-template pTemplate="caption">
        <div class="table-toolbar">
          <span class="search-box">
            <i class="pi pi-search"></i>
            <input
              pInputText
              type="text"
              placeholder="Search tasks..."
              (input)="onGlobalFilter($event, dt)"
            />
          </span>

          <p-select
            [options]="statusOptions"
            [(ngModel)]="selectedStatus"
            placeholder="Filter by status"
            class="status-filter"
            (onChange)="onStatusFilter($event.value, dt)"
          >
          </p-select>
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="title">
            Title
            <p-sortIcon field="title"></p-sortIcon>
          </th>

          <th pSortableColumn="status">
            Status
            <p-sortIcon field="status"></p-sortIcon>
          </th>

          @if (isAdmin$ | async) {
            <th pSortableColumn="assignedToUserId">
              Assigned User
              <p-sortIcon field="assignedToUserId"></p-sortIcon>
            </th>
          }

          <th style="width: 120px">Actions</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-task>
        <tr>
          <td>{{ task.title }}</td>

          <td>
            <span class="status-badge status-{{ task.status }}">
              {{ getStatusLabel(task.status) }}
            </span>
          </td>

          @if (isAdmin$ | async) {
            <td>{{ getAssignedUserName(task.assignedToUserId) }}</td>
          }

          <td class="actions">
            <button
              pButton
              icon="pi pi-pencil"
              class="p-button-rounded p-button-text p-button-sm"
              (click)="openEditTask(task)"
            ></button>

            <button
              pButton
              icon="pi pi-trash"
              class="p-button-rounded p-button-text p-button-danger p-button-sm"
              (click)="deleteTask(task.id)"
            ></button>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="4" class="empty">No tasks found.</td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>
