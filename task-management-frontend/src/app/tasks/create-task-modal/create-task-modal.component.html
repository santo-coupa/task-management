<form [formGroup]="form" (ngSubmit)="submit()" class="task-form">

  <div class="form-field">
    <label>Name *</label>
    <input pInputText formControlName="name" />
  </div>

  <div class="form-field">
    <label>Description</label>
    <textarea
      pInputText
      rows="4"
      maxlength="1000"
      formControlName="description"
    ></textarea>

    <small>
      {{form.get('description')?.value?.length || 0}}/1000
    </small>
  </div>

  <div class="form-field">
    <label>Assign To (User ID)</label>
    <p-select
      [options]="users"
      optionLable="label"
      optionValue="value"
      formControlName="assigneeId"
      placeholder="Select user"
    ></p-select>
  </div>

  <div class="form-field">
    <label>Status</label>
    <p-select
      [options]="statusOptions"
      formControlName="status"
      optionLabel="label"
      optionValue="value"
      placeholder="Select status"
    ></p-select>
  </div>

  <div class="form-field">
    <label>Due Date</label>
    <p-datePicker 
      formControlName="dueDate"
      [showIcon]="true"
      dateFormat="yy-mm-dd"
    ></p-datePicker>
  </div>

  <div class="dialog-actions">
    <button
      pButton
      type="button"
      label="Cancel"
      class="p-button-text"
      (click)="cancel()"
    ></button>

    <button
      pButton
      type="submit"
      [label]="isEditMode ? 'Update Task' : 'Create Task'"
      icon="pi pi-check"
    ></button>
  </div>

</form>
